[pytest]
# Pytest configuration for lafcbot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may be slower)
    formatter: Formatter tests
    detector: Event detector tests
    monitoring: Live monitoring tests

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info htmlcov

# Coverage options
# To enable coverage by default, uncomment the line below:
# addopts = --cov=lafcbot --cov-report=html --cov-report=term-missing
